services:
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: kertas-kerja-app
    restart: unless-stopped
    ports:
      - "${PORT:-5181}:${PORT:-5181}"
    env_file:
      - ./app/.env
    environment:
      - NODE_ENV=production
    volumes:
      # Mount data folder back to host for persistence
      - app-data:/app/data
      
      # UNCOMMENT and MODIFY to mount Windows Network Share directly
      # (Only for Linux host)
      # - type: volume
      #   source: windows-share
      #   target: /mnt/share
      #   volume:
      #     nocopy: true
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${PORT:-5181}/api/db/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  app-data:
    driver: local

  # windows-share:
