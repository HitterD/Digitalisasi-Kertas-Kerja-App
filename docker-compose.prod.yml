services:
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: kertas-kerja-app
    restart: unless-stopped
    ports:
      - "${PORT:-5181}:${PORT:-5181}"
    env_file:
      - ./app/.env
      - ./app/.env.production  # Override SHARE_ACCESS_MODE → smb
    environment:
      - NODE_ENV=production
      - NODE_OPTIONS=--openssl-legacy-provider
      - SHARE_ACCESS_MODE=smb
    volumes:
      # Mount data folder back to host for persistence
      - app-data:/app/data

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${PORT:-5181}/api/db/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  app-data:
    driver: local
